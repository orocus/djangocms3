{% load cms_tags menu_tags sekizai_tags static %}
<!doctype html>
<html>
<head>
  <title>{% block title %}This is my new project home page{% endblock title %}</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style type="text/css">
    .nav {
      padding-left: 0;
    }

    .nav li {
      display: inline;
      list-style-type: none;
      padding-right: 20px;
    }
  </style>

  <link rel="stylesheet" href="{% static 'css/theme.css' %}">
  <link rel="stylesheet" href="{% static 'vendor/bootstrap/bootstrap-4.6.2-dist/css/bootstrap.min.css' %}">

  {% render_block "css" %}
</head>

<body>
  {% cms_toolbar %}
  <div class="container">
    <ul class="nav">
      {% show_menu 0 100 100 100 %}
    </ul>
    {% block content %}{% endblock content %}
  </div>

  <script src="{% static 'vendor/jquery/jquery.min.js' %}"></script>
  <script src="{% static 'vendor/popper/popper.min.js' %}"></script>
  <script src="{% static 'vendor/bootstrap/bootstrap-4.6.2-dist/js/bootstrap.min.js' %}"></script>

  {% render_block "js" %}
</body>

</html>
