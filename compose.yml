version: '3.8'

services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./static:/static
    depends_on:
      - app

  app:
    build:
      context: .
      target: prod
    environment:
      DJANGO_SETTINGS_MODULE: cmsproject.settings
    volumes:
      - .:/app
    command: gunicorn cmsproject.wsgi:application --bind 0.0.0.0:8000
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: djangocms
      MYSQL_USER: djangocmsuser
      MYSQL_PASSWORD: djangocmspassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: